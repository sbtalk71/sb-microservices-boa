[SERVICE]
    Flush             5
    Daemon            Off
    Log_Level         info
    Parsers_File      parsers.conf
    HTTP_Server       On
    HTTP_Listen       0.0.0.0
    HTTP_Port         2020

# ---------------------------------------------------------------------------
# INPUT: tail the JSON log file written by Logback
# (assumes logstash-logback-encoder writing one JSON object per line)
# ---------------------------------------------------------------------------
[INPUT]
    Name              tail
    Path              /logs/apps.log
    Tag               springboot.*

    Parser            spring_boot_json

    Read_from_Head    True
    Refresh_Interval  2
    Rotate_Wait       30
    Skip_Long_Lines   On
    Mem_Buf_Limit     10MB

# ---------------------------------------------------------------------------
# FILTER: normalize / rename fields commonly emitted by logstash-logback-encoder
# (adjust field names to match your actual encoder output)
# ---------------------------------------------------------------------------
[FILTER]
    Name          modify
    Match         springboot.*
    Rename        level        log_level
    Rename        logger_name  logger
    Rename        thread_name  thread

# Drop noisy/duplicate fields if present
[FILTER]
    Name          record_modifier
    Match         springboot.*
    Remove_key    @version

# ---------------------------------------------------------------------------
# OUTPUT: Elasticsearch (swap for stdout while testing)
# ---------------------------------------------------------------------------
[OUTPUT]
    Name            es
    Match           springboot.*
    Host            elasticsearch
    Port            9200
    Index           springboot-logs
    Logstash_Format On
    Logstash_Prefix springboot
    Time_Key        @timestamp
    Retry_Limit     False
    Suppress_Type_Name On

