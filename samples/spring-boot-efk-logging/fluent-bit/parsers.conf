[PARSER]
    Name         spring_boot_json
    Format       json
    Time_Key     timestamp
    Time_Format  %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep    On
    Decode_Field_As   json  message

# Optional: if your encoder nests exception/stack_trace as a string field
# and you want it kept as-is (no further decoding needed), no action required
# since Format json already parses the full line into structured fields.
