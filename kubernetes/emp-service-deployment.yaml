apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: emp-service
  name: emp-service
  namespace: default
  
spec:
  progressDeadlineSeconds: 600
  replicas: 3
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: emp-service
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
       labels:
        app: emp-service
    spec:
      containers:
      - name: emp-service
        image: sbtalk71/emp-service:v2
        imagePullPolicy: IfNotPresent
        
        env:
        - name: DATABASE
          valueFrom:
            configMapKeyRef:
              key: DB_NAME
              name: emp-service-config
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              key: DB_HOST
              name: emp-service-config
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              key: DB_PASSWORD
              name: emp-service-secrets
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              key: DB_PORT
              name: emp-service-config
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              key: DB_USER
              name: emp-service-config
      
       
      restartPolicy: Always
      
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: emp-service
  name: emp-service
  namespace: default
  
spec:
  
  ports:
  - port: 8081
    protocol: TCP
    targetPort: 8081
  selector:
    app: emp-service
  sessionAffinity: None
  type: LoadBalancer